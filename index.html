<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식물 도감 AI</title>
    <!-- Tailwind CSS (디자인용) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 테레폰 및 티처블머신 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-between p-4">

    <!-- 헤더 -->
    <header class="text-center my-6">
        <h1 class="text-3xl font-bold text-green-700 flex items-center justify-center gap-2">
            🌱 AI 식물 도감
        </h1>
        <p class="text-gray-500 mt-2 text-sm">사진을 찍거나 업로드하여 식물 이름을 알아보세요!</p>
    </header>

    <!-- 메인 컨텐츠 카드 -->
    <main class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 p-6 flex flex-col items-center gap-6">
        
        <!-- 이미지 표시 영역 -->
        <div class="relative w-full aspect-square bg-gray-100 rounded-2xl overflow-hidden flex items-center justify-center border-2 border-dashed border-gray-200">
            <img id="preview" class="w-full h-full object-cover hidden" alt="식물 이미지">
            <video id="webcam" class="w-full h-full object-cover hidden" autoplay playsinline></video>
            <div id="placeholder" class="text-gray-400 text-center p-4">
                <span class="text-4xl block mb-2">📸</span>
                <p class="text-sm">카메라를 켜거나 이미지를 올려주세요</p>
            </div>
            <!-- 로딩 스피너 -->
            <div id="loading" class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-white hidden">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-green-500 border-t-transparent mb-2"></div>
                <p class="text-sm">AI 분석 중...</p>
            </div>
        </div>

        <!-- 컨트롤 버튼 -->
        <div class="grid grid-cols-2 gap-3 w-full">
            <button onclick="startWebcam()" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-xl transition-all text-sm flex items-center justify-center gap-1">
                📷 실시간 카메라
            </button>
            <label class="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 font-semibold py-3 px-4 rounded-xl transition-all text-sm flex items-center justify-center gap-1 cursor-pointer text-center">
                📁 사진 올리기
                <input type="file" accept="image/*" onchange="handleFileUpload(event)" class="hidden">
            </label>
        </div>

        <button id="capture-btn" onclick="captureAndPredict()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all hidden">
            찰칵! 이 식물 분석하기
        </button>

        <!-- 결과 표시 영역 -->
        <div id="result-box" class="w-full border-t border-gray-100 pt-4 hidden text-center">
            <p class="text-xs text-gray-400 font-semibold uppercase tracking-wider">AI 분석 결과</p>
            <h2 id="plant-name" class="text-2xl font-bold text-green-800 mt-1">-</h2>
            <p id="plant-desc" class="text-gray-600 text-sm mt-2 px-2 bg-green-50 py-2 rounded-lg border border-green-100">-</p>
            <p id="probability" class="text-xs text-gray-400 mt-2">일치도: 0%</p>
        </div>

    </main>

    <!-- 푸터 -->
    <footer class="text-center text-xs text-gray-400 my-6">
        © AI Plant Identifier Class
    </footer>

    <script>
        // 사용자가 올린 티처블머신 모델 URL
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/IWbJ4tOH-/";
        
        let model, webcamStream, isWebcamActive = false;

        // 💡 [중요] 티처블머신 클래스 이름과 매칭되는 한글 이름 및 한 줄 설명 설정
        // 티처블머신에 등록하신 '클래스 이름(영어 혹은 한글)'을 좌측 키값과 똑같이 맞춰주세요!
        const plantDatabase = {
            "장미": {
                name: "장미",
                desc: "꽃말은 사랑과 열정, 겹겹이 쌓인 꽃잎과 가시가 매력적인 꽃의 여왕입니다."
            },
            "라일락": {
                name: "라일락 (수수꽃다리)",
                desc: "봄에 향기로운 보라색 꽃을 피우며, 하트 모양의 매끄러운 잎이 마주나게 달립니다."
            },
            "하늘타리": {
                name: "하늘타리",
                desc: "여름철 밤에 하얗고 실타래 같은 특이한 꽃을 피우며, 가을에는 참외 모양의 노란 열매가 매달리는 덩굴성 야생화입니다."
            },
            "배롱나무": {
                name: "배롱나무",
                desc: "한여름부터 가을까지 100일 동안 분홍빛 꽃을 피우며, 손으로 비비면 간지럼을 탄다는 속설이 있을 만큼 매끄러운 줄기가 특징인 조경수입니다."
            },
            "맨드라미": {
                name: "맨드라미",
                desc: "닭의 볏을 닮은 개성 넘치는 모양과 벨벳처럼 부드러운 촉감을 지녔으며, 여름부터 가을까지 정원을 붉고 화려하게 물들이는 꽃입니다."
            },
            "미국개오동": {
                name: "미국개오동",
                desc: "손바닥보다 큰 거대한 하트 모양 잎이 특징이며, 초여름에 흰 꽃이 핀 뒤 가을이면 노끈 모양의 길쭉한 열매가 매달리는 큰 나무입니다."
            },
            "음나무": {
                name: "음나무",
                desc: "험상궂고 날카로운 가시가 줄기에 빽빽하며, 봄철 맛있는 '개두릅(새순)'을 내어주는 약용수입니다."
            },
            "화살나무": {
                name: "화살나무",
                desc: "가지에 화살 깃을 닮은 납작한 날개가 달려 있고, 가을에 불타듯 붉은 단풍이 드는 나무입니다."
            },
            "회양목": {
                name: "회양목",
                desc: "아파트 화단이나 길가에서 흔히 볼 수 있으며, 사계절 내내 푸르고 둥글게 다듬어 키우는 단단한 나무입니다."
            },
            "곰솔": {
                name: "곰솔",
                desc: "바닷바람을 견디는 강인한 생명력을 가졌으며, 빳빳하고 억센 검은빛 솔잎이 매력적인 소나무입니다."
            },
            "무궁화": {
                name: "무궁화",
                desc: "여름부터 가을까지 매일 끊임없이 새 꽃을 피우며, 우리 민족의 끈기와 아름다움을 상징하는 나라꽃입니다."
            },
            "향나무": {
                name: "향나무",
                desc: "실타래처럼 꼬인 부드러운 비늘잎을 가졌으며, 제사나 고급 목공예에 쓰이는 향기로운 나무입니다."
            },
            "주목": {
                name: "주목",
                desc: "바늘 모양 잎을 가졌으며, '살아서 천 년, 죽어서 천 년'을 간다고 할 만큼 목재가 붉고 단단한 나무입니다."
            },
            "감나무": {
                name: "감나무",
                desc: "가을이면 가지마다 주황색 감이 주렁주렁 열리고, 잎은 붉고 넓게 물들어 시골 풍경을 완성하는 친숙한 유실수입니다."
            },
            "영산홍": {
                name: "영산홍",
                desc:"봄날 정원과 공원을 온통 화사한 분홍빛과 붉은빛으로 뒤덮으며, 철쭉보다 꽃이 작고 잎이 늘 푸른 조경수입니다."
            },
             "주걱개망초": {
                name: "주걱개망초",
                desc: "개망초와 닮았으나 잎이 주걱 모양으로 둥글고 밑부분이 줄기를 감싸며, 척박한 땅에서도 하얗고 자잘한 꽃을 피우는 들풀입니다."
            },
             "채송화": {
                name: "채송화",
                desc: "뜨거운 여름 햇살 아래 알록달록한 잔잔한 꽃을 피우며, 가뭄을 잘 견디는 통통하고 귀여운 잎을 가진 한해살이풀입니다."
            },

        };

        // 페이지 로드 시 모델 미리 로드
        async function init() {
            try {
                model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
                console.log("티처블 머신 모델 로드 완료!");
            } catch (e) {
                alert("모델을 불러오는데 실패했습니다. URL을 확인해주세요.");
            }
        }
        init();

        // 카메라 켜기
        async function startWebcam() {
            stopWebcam();
            document.getElementById("preview").classList.add("hidden");
            document.getElementById("placeholder").classList.add("hidden");
            const video = document.getElementById("webcam");
            video.classList.remove("hidden");

            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }, // 후면 카메라 우선
                    audio: false
                });
                video.srcObject = webcamStream;
                isWebcamActive = true;
                document.getElementById("capture-btn").classList.remove("hidden");
            } catch (err) {
                alert("카메라 권한이 필요하거나 지원하지 않는 브라우저입니다.");
            }
        }

        // 카메라 끄기
        function stopWebcam() {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById("webcam").classList.add("hidden");
            document.getElementById("capture-btn").classList.add("hidden");
            isWebcamActive = false;
        }

        // 파일 업로드 처리
        function handleFileUpload(event) {
            stopWebcam();
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById("preview");
                img.src = e.target.result;
                img.classList.remove("hidden");
                document.getElementById("placeholder").classList.add("hidden");
                
                // 이미지 로드 완료 후 AI 예측 실행
                img.onload = () => predict(img);
            }
            reader.readAsDataURL(file);
        }

        // 실시간 카메라 화면 캡처 후 분석
        async function captureAndPredict() {
            if (!isWebcamActive) return;
            const video = document.getElementById("webcam");
            
            // 임시 캔버스 생성하여 현재 프레임 캡처
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 비디오 멈추고 캡처한 이미지 보여주기
            stopWebcam();
            const img = document.getElementById("preview");
            img.src = canvas.toDataURL("image/png");
            img.classList.remove("hidden");

            img.onload = () => predict(img);
        }

        // AI 예측 실행 함수
        async function predict(imageElement) {
            if (!model) {
                alert("모델이 아직 로드 중입니다. 잠시만 기다려주세요.");
                return;
            }

            document.getElementById("loading").classList.remove("hidden");
            document.getElementById("result-box").classList.add("hidden");

            // 모델 예측
            const prediction = await model.predict(imageElement);
            
            // 가장 확률이 높은 클래스 찾기
            let highestPredict = { className: "", probability: 0 };
            prediction.forEach(p => {
                if (p.probability > highestPredict.probability) {
                    highestPredict = p;
                }
            });

            // 결과 화면 업데이트
            const resultBox = document.getElementById("result-box");
            const nameEl = document.getElementById("plant-name");
            const descEl = document.getElementById("plant-desc");
            const probEl = document.getElementById("probability");

            const classKey = highestPredict.className.trim(); // 티처블머신의 클래스명
            const matchPlant = plantDatabase[classKey];

            if (matchPlant) {
                nameEl.innerText = matchPlant.name;
                descEl.innerText = matchPlant.desc;
            } else {
                // 데이터베이스 매칭 실패 시 기본 클래스명 출력
                nameEl.innerText = classKey;
                descEl.innerText = "이 식물에 대한 설명 정보가 등록되어 있지 않습니다.";
            }

            probEl.innerText = `일치도: ${(highestPredict.probability * 100).toFixed(1)}%`;
            
            document.getElementById("loading").classList.add("hidden");
            resultBox.classList.remove("hidden");
        }
    </script>
</body>
</html>
